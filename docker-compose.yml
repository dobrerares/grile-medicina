services:
  backend:
    build:
      context: .
      dockerfile: webapp/backend/Dockerfile
    volumes:
      - sqlite_data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATA_PATH=/data/grile.json
      - PDF_PATH=/data/pdfs
      - DB_PATH=/app/data/quiz.db
      - INVITE_CODE=${INVITE_CODE:-grile2025}

  frontend:
    build: webapp/frontend
    depends_on:
      - backend

volumes:
  sqlite_data:
